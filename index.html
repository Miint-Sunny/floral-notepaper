<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>花笺</title>
    <script>
      (function () {
        var opt = localStorage.getItem("theme-option");
        var t;
        if (opt === "light" || opt === "dark") {
          t = opt;
        } else {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
        // The macOS main window is opaque (tauri.macos.conf transparent:false), so
        // paint the themed paper background immediately — before React mounts — so a
        // window reveal never flashes the webview's default white. Other platforms
        // keep the transparent background (custom rounded shell).
        if (/Mac/.test(navigator.platform) || /Mac/.test(navigator.userAgent)) {
          document.documentElement.style.backgroundColor = t === "dark" ? "#222120" : "#f6f3ec";
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        background: transparent;
      }

      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
